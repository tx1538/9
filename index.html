<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#111115">
  <title>酒局派对小游戏</title>
  <link rel="stylesheet" href="assets/styles.css?v=2.2">
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Party Games H5</p>
        <h1>酒局派对小游戏</h1>
      </div>
      <button class="icon-btn" id="refreshBtn" title="刷新房间状态">↻</button>
    </header>

    <main id="app" class="main"></main>

    <nav class="bottom-nav" aria-label="主导航">
      <button data-tab="home" class="active"><span>大厅</span></button>
      <button data-tab="games"><span>玩法</span></button>
      <button data-tab="room"><span>房间</span></button>
      <button data-tab="admin"><span>后台</span></button>
    </nav>
  </div>

  <div class="toast" id="toast" role="status"></div>

  <div class="modal" id="ageModal" hidden>
    <div class="modal-panel">
      <p class="eyebrow">成年人适用</p>
      <h2>理性娱乐，饮料也可以替代</h2>
      <p>本工具只提供聚会互动玩法，请确认参与者已成年，并避免强迫、危险或让人不舒服的内容。</p>
      <button class="primary full" id="ageConfirm" onclick="confirmAdultAge(); return false;">我已了解</button>
    </div>
  </div>

  <script>
    function confirmAdultAge() {
      try {
        localStorage.setItem('drink_age_confirmed', '1');
      } catch (error) {}
      var modal = document.getElementById('ageModal');
      if (modal) {
        modal.hidden = true;
        modal.setAttribute('hidden', 'hidden');
        modal.style.display = 'none';
      }
    }
  </script>
  <script src="assets/app.js?v=2.2"></script>
</body>
</html>
